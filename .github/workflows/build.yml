name: Build MouseFlow.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyautogui pillow pyinstaller pywin32 cairosvg

      - name: Convert SVG to ICO
        run: python convert_icon.py

      - name: Verify icon
        run: |
          if (Test-Path "mouseflow.ico") {
            Write-Host "OK mouseflow.ico trouve - taille: $((Get-Item mouseflow.ico).length) bytes"
          } else {
            Write-Error "mouseflow.ico INTROUVABLE"
            exit 1
          }

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "MouseFlow" --icon="mouseflow.ico" --hidden-import pyautogui --hidden-import PIL --hidden-import pyscreeze mouseflow.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: MouseFlow-Windows
          path: dist/MouseFlow.exe
