name: Build MouseFlow.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyautogui pillow pyinstaller pywin32

      - name: Generate icon
        run: |
          python generate_icon.py

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "MouseFlow" `
            --icon="mouseflow.ico" `
            --hidden-import pyautogui `
            --hidden-import PIL `
            --hidden-import pyscreeze `
            --version-file version_info.txt `
            mouseflow.py

      - name: Upload MouseFlow.exe
        uses: actions/upload-artifact@v4
        with:
          name: MouseFlow-Windows
          path: dist/MouseFlow.exe
